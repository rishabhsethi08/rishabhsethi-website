<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calo — Strategy — Rishabh Sethi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F5F5F3; --surface: #FFFFFF; --ink: #111111;
  --mid: #555555; --muted: #7A7F86; --faint: #BBBBBB;
  --rule: rgba(0,0,0,0.07);
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'IBM Plex Mono', 'SF Mono', monospace;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 15px; line-height: 1.7; -webkit-font-smoothing: antialiased; }
::selection { background: var(--ink); color: var(--bg); }
.page { max-width: 620px; margin: 0 auto; padding: 4rem 2.5rem 6rem; }
.back-link {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  text-decoration: none; margin-bottom: 4rem;
  opacity: 0; animation: fadeUp 0.5s ease forwards;
  transition: color 0.15s ease;
}
.back-link:hover { color: var(--ink); }
.cover {
  width: 100%; height: 260px; border-radius: 12px;
  background: linear-gradient(160deg, #5A4A32 0%, #8A7A58 50%, #B8A878 100%);
  margin-bottom: 2.5rem;
  opacity: 0; animation: fadeUp 0.5s ease 0.05s forwards;
}
.post-meta {
  font-family: var(--mono); font-size: 11px; color: var(--faint);
  letter-spacing: 0.04em; margin-bottom: 0.75rem;
  opacity: 0; animation: fadeUp 0.5s ease 0.1s forwards;
}
.post-title {
  font-size: 26px; font-weight: 600; line-height: 1.25;
  letter-spacing: -0.02em; color: var(--ink); margin-bottom: 1rem;
  opacity: 0; animation: fadeUp 0.5s ease 0.13s forwards;
}
.post-caption {
  font-family: var(--mono); font-size: 13px; color: var(--muted);
  line-height: 1.5; margin-bottom: 3rem;
  opacity: 0; animation: fadeUp 0.5s ease 0.16s forwards;
}
.coming-soon {
  padding: 2rem 0; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
  font-size: 13px; color: var(--muted); line-height: 1.75;
  opacity: 0; animation: fadeUp 0.5s ease 0.2s forwards;
}
.footer {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 11px; color: var(--faint); padding-top: 2rem;
  border-top: 1px solid var(--rule); margin-top: 6rem;
  opacity: 0; animation: fadeUp 0.5s ease 0.25s forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@media (max-width: 620px) {
  .page { padding: 3rem 1.5rem 4.5rem; }
  .post-title { font-size: 21px; }
  .cover { height: 180px; }
  .footer { flex-direction: column; gap: 0.3rem; }
}
</style>
</head>
<body>
<div class="page">
  <a class="back-link" href="../index.html">← Rishabh Sethi</a>
  <div class="cover"></div>
  <p class="post-meta">Work</p>
  <h1 class="post-title">Calo — Strategy</h1>
  <p class="post-caption">Reframed the market entirely.</p>
  <div class="coming-soon">
    This case study is being written. Check back soon, or <a href="mailto:hello@rishabhsethi.com" style="color:var(--ink);">get in touch</a> if you'd like to hear about it directly.
  </div>
  <div class="footer">
    <span>Rishabh Sethi · 2026</span>
    <span>Dubai, UAE</span>
  </div>
</div>
</body>
</html>
